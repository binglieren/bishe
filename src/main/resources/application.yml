server:
  port: 8088

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/kaoyan
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# JWT 配置
jwt:
  secret: your-256-bit-secret-key-here-change-in-production-environment
  expiration: 86400000  # 24小时（毫秒）

# LLM API 配置
llm:
  api-key: sk-oaLWXnXz5RDWAmFSHyzP1eEAlJYfa6pYWASQyIgMKUOs9eFF9QcxpThLaL52W9wS
  api-url: https://opencode.ai/zen/go/v1/chat/completions
  model: glm-5.1

# 文件上传路径
file:
  upload-dir: ./uploads

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
